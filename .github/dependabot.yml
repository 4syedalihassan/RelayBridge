version: 2
updates:
  # Enable weekly security audits and updates for Rust Cargo crates
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable weekly security audits and updates for Node.js NPM packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable weekly security audits for desktop-ui NPM sub-workspace
  - package-ecosystem: "npm"
    directory: "/packages/desktop-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
